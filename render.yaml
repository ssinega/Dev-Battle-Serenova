services:
  - type: web
    name: serenova-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: serenova-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false

databases:
  - name: serenova-db
    databaseName: serenova_db
    user: serenova
